<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>FTR VR - Seviye 1 (Ağır Sinematik ve Geri Bildirimli Mod)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(10, 15, 25, 0.98);
            z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        button {
            padding: 18px 36px; font-size: 20px; background-color: #2ecc71; color: white; border: none;
            border-radius: 8px; cursor: pointer; margin-top: 25px; font-weight: bold;
        }
        #vr-divider { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background-color: rgba(255,255,255,0.15); z-index: 5; display: none; }
        
        /* Çift Ekran İçin Görsel Geri Bildirim Göstergeleri */
        .feedback-container {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50%; height: 200px; display: none; justify-content: center; align-items: center;
            font-size: 90px; font-weight: bold; z-index: 4; pointer-events: none;
        }
        #feedback-left { left: 0; }
        #feedback-right { left: 50%; }
        .success-tick { color: #2ecc71; text-shadow: 0 0 20px rgba(46,204,113,0.6); }
        .fail-cross { color: #e74c3c; text-shadow: 0 0 20px rgba(231,76,60,0.6); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h2>Yavru Kuş Kurtarma: Seviye 1</h2>
        <p><b>SİNEMATİK VE GERİ BİLDİRİMLİ KLİNİK MOD</b></p>
        <p>Telefonu tam karşınızda dik tutarak YAN ÇEVİRİN ve butona basın.</p>
        <p style="font-size: 14px; color: #3498db; font-weight: bold;">
            (Düşüş hızı yarıya indirildi, süzülme yumuşatıldı. Başarı durumunda sesli ve görsel bildirim tetiklenir.)
        </p>
        <button id="startButton">VR MODUNU BAŞLAT</button>
    </div>

    <div id="vr-divider"></div>
    
    <div id="feedback-left" class="feedback-container"></div>
    <div id="feedback-right" class="feedback-container"></div>

    <script>
        // --- KLİNİK VE SAYASAL PARAMETRELER ---
        let currentStage = 0; 
        let stageTargetCounts = [5, 5, 5, 6]; 
        let stageSuccessCount = 0;
        let loopCounter = 1; 
        let totalScore = 0;

        // Jiroskop Filtreleme Değişkenleri (Sinematik Ağırlaştırma)
        let targetX = 0;
        let currentX = 0;
        const filterFactor = 0.02; // 0.05'ten 0.02'ye düşürüldü (Çok daha pürüzsüz ve ağır)
        
        let gyroCenterBeta = null;  
        const sensitivity = 0.15; 
        const deadzone = 1.0; 
        
        // Düşüş Hızı (Yarıya Düşürüldü)
        const dropSpeed = 0.02; // 0.04'ten 0.02'ye indirildi

        let isWaitingForCenter = true; 
        const centerTolerance = 5.0; 

        // VR Kamera Ayarları (Toe-in 3D Derinlik)
        const ipd = 0.15; 

        // Three.js Değişkenleri
        let scenes = [], cameras = [], renderer;
        let bird, leftNest, rightNest;
        let isPlaying = false;
        let wakeLock = null;
        let audioCtx = null;

        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const vrDivider = document.getElementById('vr-divider');
        const fbLeft = document.getElementById('feedback-left');
        const fbRight = document.getElementById('feedback-right');

        startButton.addEventListener('click', startOyun);

        // --- TELİFSİZ VE BAĞIMSIZ SES MOTORU (Web Audio API) ---
        function playSound(type) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            if (type === 'center') {
                // Merkez kilit açılma sesi (Hafif klik)
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 600; gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                osc.stop(audioCtx.currentTime + 0.12);
            } 
            else if (type === 'success') {
                // Pozitif Başarı Melodisi (Çift Tonlu Neşeli Ses)
                let now = audioCtx.currentTime;
                let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.frequency.setValueAtTime(523.25, now); // C5 notası
                osc1.frequency.setValueAtTime(659.25, now + 0.1); // E5 notası
                gain1.gain.setValueAtTime(0.15, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc1.start(now); osc1.stop(now + 0.3);
            } 
            else if (type === 'fail') {
                // Başarısızlık Sesi (Kalın Uyarı Tonu)
                let now = audioCtx.currentTime;
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'sawtooth'; // Daha belirgin bir uyarı için testere dişi dalga
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(180, now); // Kalın pes ses
                osc.frequency.linearRampToValueAtTime(120, now + 0.25);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // --- GÖRSEL GERİ BİLDİRİM TETİKLEYİCİSİ ---
        function triggerVisualFeedback(isSuccess) {
            if (isSuccess) {
                fbLeft.innerHTML = '<span class="success-tick">&#10004;</span>';
                fbRight.innerHTML = '<span class="success-tick">&#10004;</span>';
                playSound('success');
            } else {
                fbLeft.innerHTML = '<span class="fail-cross">&#10006;</span>';
                fbRight.innerHTML = '<span class="fail-cross">&#10006;</span>';
                playSound('fail');
            }
            
            fbLeft.style.display = 'flex';
            fbRight.style.display = 'flex';

            // 500ms (0.5 saniye) sonra ekrandan temizle
            setTimeout(() => {
                fbLeft.style.display = 'none';
                fbRight.style.display = 'none';
            }, 500);
        }

        async function requestScreenHandling() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen(); }
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log(err); }
            }
        }

        function startOyun() {
            requestScreenHandling();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => { if (permissionState === 'granted') { initGame(); } })
                    .catch(console.error);
            } else { initGame(); }
        }

        function initGame() {
            overlay.style.display = 'none';
            vrDivider.style.display = 'block';
            isPlaying = true;

            window.addEventListener('deviceorientation', handleOrientation, true);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scenes.push(createSceneArchitecture());
            scenes.push(createSceneArchitecture());

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[0].position.set(-ipd, 0, 7.5); cameras[0].rotation.y = 0.015; 

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[1].position.set(ipd, 0, 7.5); cameras[1].rotation.y = -0.015; 

            bird = scenes[0].getObjectByName("bird");
            leftNest = scenes[0].getObjectByName("leftNest");
            rightNest = scenes[0].getObjectByName("rightNest");

            updateNestVisibilities();
            resetBirdPosition();

            animate();
        }

        function createSceneArchitecture() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a252f); 

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
            scene.add(ambientLight);

            const birdGroup = new THREE.Group();
            birdGroup.name = "bird";

            const bodyGeo = new THREE.SphereGeometry(0.4, 32, 32);
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0xffd700 }); 
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            birdGroup.add(body);

            const beakGeo = new THREE.ConeGeometry(0.1, 0.3, 16);
            const beakMat = new THREE.MeshBasicMaterial({ color: 0xff5722 }); 
            const beak = new THREE.Mesh(beakGeo, beakMat);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0, 0, 0.4);
            birdGroup.add(beak);
            
            scene.add(birdGroup);

            const nestMat = new THREE.MeshBasicMaterial({ color: 0xe67e22 });
            const nestGeo = new THREE.CylinderGeometry(1.2, 1.5, 0.6, 32); 

            const lNest = new THREE.Mesh(nestGeo, nestMat);
            lNest.name = "leftNest"; lNest.position.set(-2.5, -3.5, 0);
            scene.add(lNest);

            const rNest = new THREE.Mesh(nestGeo, nestMat);
            rNest.name = "rightNest"; rNest.position.set(2.5, -3.5, 0);
            scene.add(rNest);

            const lineGeo = new THREE.BoxGeometry(7, 0.04, 0.1);
            const lineMat = new THREE.MeshBasicMaterial({color: 0x34495e});
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(0, 3.3, -0.5);
            scene.add(line);

            return scene;
        }

        function handleOrientation(event) {
            if (!isPlaying) return;
            let rawBeta = event.beta; 
            if (rawBeta === null) return;

            if (gyroCenterBeta === null) gyroCenterBeta = rawBeta;
            let deltaBeta = rawBeta - gyroCenterBeta;

            if (isWaitingForCenter) {
                if (Math.abs(deltaBeta) <= centerTolerance) {
                    isWaitingForCenter = false; 
                    playSound('center'); 
                }
                targetX = 0; 
            } else {
                if (Math.abs(deltaBeta) < deadzone) {
                    targetX = 0;
                } else {
                    targetX = deltaBeta * sensitivity;
                }
            }
        }

        function resetBirdPosition() {
            bird.position.set(0, 4, 0); 
            targetX = 0; currentX = 0;
            isWaitingForCenter = true; 
        }

        function updateNestVisibilities() {
            if (currentStage === 0) { leftNest.visible = true; rightNest.visible = true; } 
            else if (currentStage === 1) { leftNest.visible = false; rightNest.visible = true; } 
            else if (currentStage === 2) { leftNest.visible = true; rightNest.visible = false; } 
            else if (currentStage === 3) {
                const rand = Math.random() > 0.5;
                leftNest.visible = rand; rightNest.visible = !rand;
            }
            scenes[1].getObjectByName("leftNest").visible = leftNest.visible;
            scenes[1].getObjectByName("rightNest").visible = rightNest.visible;
        }

        function checkCollisionAndProgress() {
            let hitCorrectNest = false;
            
            // X koordinat tolerans kontrolü
            if (bird.position.x > 0.8 && rightNest.visible) hitCorrectNest = true; 
            else if (bird.position.x < -0.8 && leftNest.visible) hitCorrectNest = true; 
            else if (currentStage === 0 && (bird.position.x > 0.8 || bird.position.x < -0.8)) hitCorrectNest = true; 

            // Geri bildirim sistemini tetikle
            triggerVisualFeedback(hitCorrectNest);

            if (hitCorrectNest) {
                stageSuccessCount++; totalScore++;
                if (stageSuccessCount >= stageTargetCounts[currentStage]) {
                    stageSuccessCount = 0; currentStage++;
                    if (currentStage > 3) {
                        if (loopCounter < 2) { loopCounter++; currentStage = 1; } 
                        else {
                            isPlaying = false;
                            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
                            alert(`TEBRİKLER! Seviye 1 Başarıyla Bitti.\nToplam Skor: ${totalScore}`);
                            location.reload(); return;
                        }
                    }
                }
            }
            updateNestVisibilities(); resetBirdPosition();
        }

        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);

            if (isWaitingForCenter) {
                bird.children[0].material.color.setHex(0x555555); 
            } else {
                bird.children[0].material.color.setHex(0xffd700); 
            }

            // Ağırlaştırılmış pürüzsüz geçiş filtresi
            currentX += (targetX - currentX) * filterFactor;
            
            if(currentX > 3.5) currentX = 3.5;
            if(currentX < -3.5) currentX = -3.5;

            bird.position.x = currentX;

            if (!isWaitingForCenter) { bird.position.y -= dropSpeed; } 
            else { if(bird.position.y > 3.4) bird.position.y -= 0.05; }

            scenes[1].getObjectByName("bird").position.copy(bird.position);
            scenes[1].getObjectByName("bird").children[0].material.color.copy(bird.children[0].material.color);

            if (bird.position.y <= -3.2) checkCollisionAndProgress();

            // Sol Göz Render
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[0], cameras[0]);

            // Sağ Göz Render
            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[1], cameras[1]);
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            cameras[0].aspect = (window.innerWidth / 2) / window.innerHeight; cameras[0].updateProjectionMatrix();
            cameras[1].aspect = (window.innerWidth / 2) / window.innerHeight; cameras[1].updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
