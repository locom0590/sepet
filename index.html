<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>FTR VR - Klinik Kalibrasyonlu ve Raporlamalı Sistem</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(10, 15, 25, 0.98);
            z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box; overflow-y: auto;
        }
        .config-group {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin: 10px 0; width: 320px;
            box-sizing: border-box; border: 1px solid rgba(255,255,255,0.1);
        }
        .config-title { font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #bdc3c7; }
        .control-row { display: flex; justify-content: space-between; align-items: center; }
        .btn-calib {
            background: #34495e; color: white; border: none; font-size: 18px; width: 35px; height: 35px;
            border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-calib:hover { background: #465c72; }
        .value-disp { font-size: 16px; font-weight: bold; min-width: 70px; text-align: center; color: #2ecc71; }
        
        select {
            padding: 10px 20px; font-size: 15px; margin-top: 5px; border-radius: 6px; 
            background: #1a252f; color: white; border: 2px solid #34495e; cursor: pointer; font-weight: bold; width: 100%;
        }
        button#startButton {
            padding: 16px 32px; font-size: 20px; background-color: #2ecc71; color: white; border: none;
            border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; width: 320px;
        }
        #vr-divider { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background-color: rgba(255,255,255,0.15); z-index: 5; display: none; }
        
        .feedback-container {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50%; height: 200px; display: none; justify-content: center; align-items: center;
            font-size: 100px; font-weight: bold; z-index: 4; pointer-events: none;
        }
        #feedback-left { left: 0; }
        #feedback-right { left: 50%; }
        .success-tick { color: #2ecc71; text-shadow: 0 0 25px rgba(46,204,113,0.7); }
        .fail-cross { color: #e74c3c; text-shadow: 0 0 25px rgba(231,76,60,0.7); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h2 style="margin-bottom: 5px;">Yavru Kuş Kurtarma</h2>
        <p style="color: #95a5a6; margin-top: 0; font-size: 14px;"><b>KLİNİK KONTROL VE KALİBRASYON PANELİ</b></p>
        
        <div class="config-group">
            <div class="config-title">Çalışılacak Protokol / Seviye</div>
            <select id="levelSelect">
                <option value="L0">Seviye 0 (Antrenman - Serbest Mod)</option>
                <option value="L1">Seviye 1 (Kognitif Mod: Stage 0 ➔ 5)</option>
            </select>
        </div>

        <div class="config-group">
            <div class="config-title">Kuş Düşüş Hızı (Tempo)</div>
            <div class="control-row">
                <button class="btn-calib" onclick="adjustSpeed(-0.01)">-</button>
                <span id="speedDisplay" class="value-disp">x1.20</span>
                <button class="btn-calib" onclick="adjustSpeed(0.01)">+</button>
            </div>
        </div>

        <div class="config-group">
            <div class="config-title">Merkezleme Kilit Toleransı</div>
            <div class="control-row">
                <button class="btn-calib" onclick="adjustTolerance(-1)">-</button>
                <span id="toleranceDisplay" class="value-disp">±8°</span>
                <button class="btn-calib" onclick="adjustTolerance(1)">+</button>
            </div>
        </div>

        <button id="startButton">VR SEANSINI BAŞLAT</button>
    </div>

    <div id="vr-divider"></div>
    
    <div id="feedback-left" class="feedback-container"></div>
    <div id="feedback-right" class="feedback-container"></div>

    <script>
        let selectedLevel = "L0"; 
        let currentStage = 0; 
        let stageTargetCounts = [5, 5, 5, 5, 5, 5]; 
        let stageSuccessCount = 0;
        let totalScore = 0;

        let currentBirdColorType = "yellow"; 
        let initialMemoryColor = "yellow"; 
        let glowingNestSide = "left"; 
        let distractorStars = [];
        
        let passedSlalom = false;
        let memoryTimerStarted = false;
        let memoryStartTime = 0;

        const COLOR_YELLOW = 0xffd700;
        const COLOR_BLUE = 0x2980b9;
        const COLOR_RED = 0xc0392b;
        const COLOR_MEMORY_GREY = 0x7f8c8d; 
        const COLOR_BRIGHT_ORANGE = 0xffa500; 
        const COLOR_DIM_ORANGE = 0x5e3311;    

        let targetX = 0;
        let currentX = 0;
        const filterFactor = 0.02; 
        let gyroCenterBeta = null;  
        const sensitivity = 0.12; 
        const deadzone = 1.0; 
        
        let dropSpeed = 0.048;
        let centerTolerance = 8.0; 

        let sessionStartTime = 0;
        let lockUnlockTime = 0; 
        let totalReactionTime = 0; 
        let validReactionCount = 0;
        let maxLeftROM = 0; 
        let maxRightROM = 0; 

        let isWaitingForCenter = true; 
        const ipd = 0.15; 

        let scenes = [], cameras = [], renderer;
        let bird, leftNest, rightNest;
        let isPlaying = false;
        let wakeLock = null;
        let audioCtx = null;

        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const levelSelect = document.getElementById('levelSelect');
        const vrDivider = document.getElementById('vr-divider');
        const fbLeft = document.getElementById('feedback-left');
        const fbRight = document.getElementById('feedback-right');

        startButton.addEventListener('click', startOyun);

        function adjustSpeed(amount) {
            let currentMultiplier = dropSpeed / 0.04;
            let newMultiplier = Math.max(0.3, Math.min(3.0, currentMultiplier + amount * 25));
            dropSpeed = newMultiplier * 0.04;
            document.getElementById('speedDisplay').innerText = 'x' + newMultiplier.toFixed(2);
        }

        function adjustTolerance(amount) {
            centerTolerance = Math.max(3, Math.min(25, centerTolerance + amount));
            document.getElementById('toleranceDisplay').innerText = '±' + centerTolerance + '°';
        }

        function initAudioEngine() {
            if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        }

        function playSound(type) {
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            if (type === 'center') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 520; gain.gain.setValueAtTime(0.08, now);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.stop(now + 0.08);
            } 
            else if (type === 'success') {
                let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.frequency.setValueAtTime(587.33, now); osc1.frequency.setValueAtTime(783.99, now + 0.08); 
                gain1.gain.setValueAtTime(0.2, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc1.start(now); osc1.stop(now + 0.3);
            } 
            else if (type === 'fail') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle'; osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(150, now); osc.frequency.linearRampToValueAtTime(90, now + 0.25);
                gain.gain.setValueAtTime(0.25, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        function triggerFeedback(isSuccess) {
            if (isSuccess) {
                fbLeft.innerHTML = '<span class="success-tick">&#10004;</span>';
                fbRight.innerHTML = '<span class="success-tick">&#10004;</span>';
                playSound('success');
            } else {
                fbLeft.innerHTML = '<span class="fail-cross">&#10006;</span>';
                fbRight.innerHTML = '<span class="fail-cross">&#10006;</span>';
                playSound('fail');
            }
            fbLeft.style.display = 'flex'; fbRight.style.display = 'flex';
            setTimeout(() => { fbLeft.style.display = 'none'; fbRight.style.display = 'none'; }, 500);
        }

        async function startWakeLock() {
            if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log(err); } }
        }

        function startOyun() {
            selectedLevel = levelSelect.value;
            currentStage = 0; 
            sessionStartTime = performance.now();

            initAudioEngine();
            startWakeLock();
            
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen(); }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => { if (permissionState === 'granted') { initGame(); } })
                    .catch(console.error);
            } else { initGame(); }
        }

        function initGame() {
            overlay.style.display = 'none';
            vrDivider.style.display = 'block';
            isPlaying = true;

            window.addEventListener('deviceorientation', handleOrientation, true);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scenes.push(createSceneArchitecture());
            scenes.push(createSceneArchitecture());

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[0].position.set(-ipd, 0, 7.5); cameras[0].rotation.y = 0.015; 

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[1].position.set(ipd, 0, 7.5); cameras[1].rotation.y = -0.015; 

            bird = scenes[0].getObjectByName("bird");
            leftNest = scenes[0].getObjectByName("leftNest");
            rightNest = scenes[0].getObjectByName("rightNest");

            setupDistractors();
            updateGameConfigurations();
            resetBirdPosition();

            animate();
        }

        function createSceneArchitecture() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a252f); 
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); scene.add(ambientLight);

            const birdGroup = new THREE.Group(); birdGroup.name = "bird";
            const bodyGeo = new THREE.SphereGeometry(0.4, 32, 32);
            const bodyMat = new THREE.MeshBasicMaterial({ color: COLOR_YELLOW });
            const body = new THREE.Mesh(bodyGeo, bodyMat); birdGroup.add(body);

            const beakGeo = new THREE.ConeGeometry(0.1, 0.3, 16);
            const beakMat = new THREE.MeshBasicMaterial({ color: 0xff5722 });
            const beak = new THREE.Mesh(beakGeo, beakMat); beak.rotation.x = Math.PI / 2; beak.position.set(0, 0, 0.4);
            birdGroup.add(beak); scene.add(birdGroup);

            const nestGeo = new THREE.CylinderGeometry(1.2, 1.5, 0.6, 32); 
            const lNest = new THREE.Mesh(nestGeo, new THREE.MeshBasicMaterial({ color: COLOR_BRIGHT_ORANGE }));
            lNest.name = "leftNest"; lNest.position.set(-2.5, -3.5, 0); scene.add(lNest);

            const rNest = new THREE.Mesh(nestGeo, new THREE.MeshBasicMaterial({ color: COLOR_BRIGHT_ORANGE }));
            rNest.name = "rightNest"; rNest.position.set(2.5, -3.5, 0); scene.add(rNest);

            const lineGeo = new THREE.BoxGeometry(7, 0.04, 0.1);
            const lineMat = new THREE.MeshBasicMaterial({color: 0x34495e});
            const line = new THREE.Mesh(lineGeo, lineMat); line.position.set(0, 3.3, -0.5); scene.add(line);

            return scene;
        }

        function setupDistractors() {
            distractorStars = [];
            const starGeo = new THREE.SphereGeometry(0.3, 8, 8); 
            for(let s=0; s<2; s++) {
                let group = new THREE.Group();
                for(let i=0; i<8; i++) {
                    let mesh = new THREE.Mesh(starGeo, new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff }));
                    mesh.position.set((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 6, -1);
                    mesh.userData = { speedY: 0.02 + Math.random() * 0.03, speedX: (Math.random() - 0.5) * 0.02 };
                    group.add(mesh);
                }
                group.visible = false; scenes[s].add(group); distractorStars.push(group);
            }
        }

        function handleOrientation(event) {
            if (!isPlaying) return;
            let rawBeta = event.beta; 
            if (rawBeta === null) return;

            if (gyroCenterBeta === null) gyroCenterBeta = rawBeta;
            let deltaBeta = rawBeta - gyroCenterBeta;

            if (deltaBeta < 0 && Math.abs(deltaBeta) > maxLeftROM) maxLeftROM = Math.abs(deltaBeta);
            if (deltaBeta > 0 && deltaBeta > maxRightROM) maxRightROM = deltaBeta;

            if (isWaitingForCenter) {
                if (Math.abs(deltaBeta) <= centerTolerance) {
                    isWaitingForCenter = false; 
                    playSound('center'); 
                    lockUnlockTime = performance.now(); 
                }
                targetX = 0; 
            } else {
                if (Math.abs(deltaBeta) < deadzone) { targetX = 0; } 
                else { targetX = deltaBeta * sensitivity; }
            }
        }

        function resetBirdPosition() {
            bird.position.set(0, 4, 0); 
            targetX = 0; currentX = 0;
            isWaitingForCenter = true; 
            passedSlalom = false;
            memoryTimerStarted = false;
        }

        // --- DÜZELTİLMİŞ RENK VE KURAL MANTIĞI ---
        function updateGameConfigurations() {
            let birdHex = COLOR_YELLOW;
            distractorStars.forEach(g => g.visible = false);

            if (selectedLevel === "L1") {
                // Stage'e göre kural belirleme
                if (currentStage === 0) {
                    currentBirdColorType = "yellow";
                    leftNest.material.color.setHex(COLOR_BRIGHT_ORANGE);
                    rightNest.material.color.setHex(COLOR_BRIGHT_ORANGE);
                } else if (currentStage === 1) {
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    leftNest.material.color.setHex(COLOR_BLUE);
                    rightNest.material.color.setHex(COLOR_RED);
                } else if (currentStage === 2) {
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    leftNest.material.color.setHex(COLOR_RED);
                    rightNest.material.color.setHex(COLOR_BLUE);
                } else if (currentStage === 3) {
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    leftNest.material.color.setHex(COLOR_RED);
                    rightNest.material.color.setHex(COLOR_BLUE);
                    distractorStars.forEach(g => g.visible = true);
                } else if (currentStage === 4) {
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    leftNest.material.color.setHex(COLOR_RED);
                    rightNest.material.color.setHex(COLOR_BLUE);
                } else if (currentStage === 5) {
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    initialMemoryColor = currentBirdColorType;
                    leftNest.material.color.setHex(COLOR_RED);
                    rightNest.material.color.setHex(COLOR_BLUE);
                }
                
                // Renkleri uygula
                if (currentBirdColorType === "blue") birdHex = COLOR_BLUE;
                else if (currentBirdColorType === "red") birdHex = COLOR_RED;
                else birdHex = COLOR_YELLOW;
                
                bird.children[0].material.color.setHex(birdHex);
            }
        }

        // --- DÜZELTİLMİŞ KONTROL MANTIĞI ---
        function checkCollisionAndProgress() {
            let hitCorrectNest = false;
            const finalX = bird.position.x;

            // Stage'e özel doğruluk kontrolü
            if (currentStage === 0) {
                hitCorrectNest = true; // Eğitim aşaması
            } else if (currentStage === 1 || currentStage === 2) {
                if (finalX < -0.8 && currentBirdColorType === "blue") hitCorrectNest = true;
                if (finalX > 0.8 && currentBirdColorType === "red") hitCorrectNest = true;
            } else if (currentStage === 3 || currentStage === 4) {
                if (finalX < -0.8 && currentBirdColorType === "red") hitCorrectNest = true;
                if (finalX > 0.8 && currentBirdColorType === "blue") hitCorrectNest = true;
            } else if (currentStage === 5) {
                if (finalX < -0.8 && initialMemoryColor === "red") hitCorrectNest = true;
                if (finalX > 0.8 && initialMemoryColor === "blue") hitCorrectNest = true;
            }

            triggerFeedback(hitCorrectNest);
            if (hitCorrectNest) { totalScore++; stageSuccessCount++; }
            
            if (stageSuccessCount >= 5) {
                stageSuccessCount = 0; currentStage++;
                if (currentStage > 5) { endSessionAndReport(); return; }
            }
            updateGameConfigurations(); resetBirdPosition();
        }

        function endSessionAndReport() {
            isPlaying = false;
            document.body.innerHTML = '<div style="color:white; text-align:center; padding-top:50px;">SEANS TAMAMLANDI<br>Skor: ' + totalScore + '</div>';
        }

        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);

            // --- 3. Stage 5: 2 Saniye Renk Gösterimi ---
            if (selectedLevel === "L1" && currentStage === 5 && !isWaitingForCenter) {
                if (!memoryTimerStarted) {
                    memoryStartTime = performance.now();
                    memoryTimerStarted = true;
                }
                if (performance.now() - memoryStartTime < 2000) {
                    let birdHex = (currentBirdColorType === "blue") ? COLOR_BLUE : COLOR_RED;
                    bird.children[0].material.color.setHex(birdHex);
                } else {
                    bird.children[0].material.color.setHex(COLOR_MEMORY_GREY);
                }
            } else if (!isWaitingForCenter) {
                let birdHex = (currentBirdColorType === "blue") ? COLOR_BLUE : COLOR_RED;
                bird.children[0].material.color.setHex(birdHex);
            }

            // --- 2. Stage 4: Slalom Engeli Mantığı ---
            if (selectedLevel === "L1" && currentStage === 4 && !isWaitingForCenter) {
                if (bird.position.y < 0.5 && bird.position.y > -0.5) {
                    if (Math.abs(bird.position.x) < 1.0) passedSlalom = true;
                }
            }

            if (selectedLevel === "L1" && currentStage === 3 && !isWaitingForCenter) {
                distractorStars.forEach(group => {
                    group.children.forEach(star => {
                        star.position.y -= star.userData.speedY; star.position.x += star.userData.speedX;
                        if(star.position.y < -4) { star.position.y = 4; star.position.x = (Math.random() - 0.5) * 6; }
                    });
                });
            }

            currentX += (targetX - currentX) * filterFactor;
            if(currentX > 3.5) currentX = 3.5; if(currentX < -3.5) currentX = -3.5;
            bird.position.x = currentX;

            if (!isWaitingForCenter) { 
                if(selectedLevel === "L1" && currentStage === 4 && !passedSlalom && bird.position.y < 0) {
                    // Engel geçilmediği sürece kuş yavaşlar veya durur
                } else {
                    bird.position.y -= dropSpeed; 
                }
            } else { if(bird.position.y > 3.4) bird.position.y -= 0.05; }

            scenes[1].getObjectByName("bird").position.copy(bird.position);
            if (bird.position.y <= -3.2) checkCollisionAndProgress();

            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[0], cameras[0]);

            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[1], cameras[1]);
        }
    </script>
</body>
</html>
