<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>FTR VR - Seviye Menüsü ve Kognitif Akış</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; user-select: none; }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(10, 15, 25, 0.98);
            z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        select {
            padding: 12px 24px; font-size: 16px; margin-top: 15px; border-radius: 6px; 
            background: #1a252f; color: white; border: 2px solid #34495e; cursor: pointer; font-weight: bold;
        }
        button {
            padding: 18px 36px; font-size: 20px; background-color: #2ecc71; color: white; border: none;
            border-radius: 8px; cursor: pointer; margin-top: 25px; font-weight: bold;
        }
        #vr-divider { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background-color: rgba(255,255,255,0.15); z-index: 5; display: none; }
        
        /* Çift Ekran Görsel Geri Bildirim Göstergeleri */
        .feedback-container {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50%; height: 200px; display: none; justify-content: center; align-items: center;
            font-size: 100px; font-weight: bold; z-index: 4; pointer-events: none;
        }
        #feedback-left { left: 0; }
        #feedback-right { left: 50%; }
        .success-tick { color: #2ecc71; text-shadow: 0 0 25px rgba(46,204,113,0.7); }
        .fail-cross { color: #e74c3c; text-shadow: 0 0 25px rgba(231,76,60,0.7); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h2>Yavru Kuş Kurtarma: Ana Menü</h2>
        <p><b>KLİNİK SEVİYE SEÇİM EKRANI</b></p>
        
        <label for="levelSelect" style="font-size: 16px; color: #bdc3c7;">Çalışılacak Seviyeyi Seçin:</label>
        <select id="levelSelect">
            <option value="L0">Seviye 0 (Antrenman - Serbest Mod)</option>
            <option value="L1">Seviye 1 (Kognitif Mod: Stage 0 ➔ 1 ➔ 2)</option>
        </select>

        <button id="startButton">VR MODUNU BAŞLAT</button>
    </div>

    <div id="vr-divider"></div>
    
    <div id="feedback-left" class="feedback-container"></div>
    <div id="feedback-right" class="feedback-container"></div>

    <script>
        // --- KLİNİK SEVİYE VE AKIŞ YÖNETİMİ ---
        let selectedLevel = "L0"; // "L0" veya "L1"
        let currentStage = 0; // Seviye 1 seçilirse: Stage 0, Stage 1, Stage 2
        let stageTargetCounts = [5, 5, 5]; 
        let stageSuccessCount = 0;
        let totalScore = 0;

        // Bilişsel Uyaran Değişkenleri
        let currentBirdColorType = "yellow"; 
        let glowingNestSide = "left"; 

        // Renk Paleti (Kesinleştirilmiş HEX Kodları)
        const COLOR_YELLOW = 0xffd700;
        const COLOR_BLUE = 0x2980b9;
        const COLOR_RED = 0xc0392b;
        
        // Stage 0 İçin Parlak ve Sönük Turuncu Tonları
        const COLOR_BRIGHT_ORANGE = 0xffa500; // Hedef Parlak Turuncu
        const COLOR_DIM_ORANGE = 0x5e3311;    // Sönük Koyu Turuncu

        // Jiroskop Yapılandırması (Sadece X Ekseni)
        let targetX = 0;
        let currentX = 0;
        const filterFactor = 0.02; 
        let gyroCenterBeta = null;  
        const sensitivity = 0.12; 
        const deadzone = 1.0; 
        
        // Hız Ayarı (Klinik x1.2 Tempo)
        const dropSpeed = 0.048; 

        // Tolerans Ayarı (8 Derecelik Tam Tolerans)
        let isWaitingForCenter = true; 
        const centerTolerance = 8.0; 

        // VR Kamera Ayarları
        const ipd = 0.15; 

        // Three.js ve Sistem Değişkenleri
        let scenes = [], cameras = [], renderer;
        let bird, leftNest, rightNest;
        let isPlaying = false;
        let wakeLock = null;
        let audioCtx = null;

        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const levelSelect = document.getElementById('levelSelect');
        const vrDivider = document.getElementById('vr-divider');
        const fbLeft = document.getElementById('feedback-left');
        const fbRight = document.getElementById('feedback-right');

        startButton.addEventListener('click', startOyun);

        // --- SES MOTORU (Web Audio API) ---
        function initAudioEngine() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            
            if (type === 'center') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.value = 520; gain.gain.setValueAtTime(0.08, now);
                osc.start(); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.stop(now + 0.08);
            } 
            else if (type === 'success') {
                let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
                osc1.connect(gain1); gain1.connect(audioCtx.destination);
                osc1.frequency.setValueAtTime(587.33, now); 
                osc1.frequency.setValueAtTime(783.99, now + 0.08); 
                gain1.gain.setValueAtTime(0.2, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc1.start(now); osc1.stop(now + 0.3);
            } 
            else if (type === 'fail') {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.25);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }

        // --- GÖRSEL GERI BILDIRIM ---
        function triggerFeedback(isSuccess) {
            if (isSuccess) {
                fbLeft.innerHTML = '<span class="success-tick">&#10004;</span>';
                fbRight.innerHTML = '<span class="success-tick">&#10004;</span>';
                playSound('success');
            } else {
                fbLeft.innerHTML = '<span class="fail-cross">&#10006;</span>';
                fbRight.innerHTML = '<span class="fail-cross">&#10006;</span>';
                playSound('fail');
            }
            
            fbLeft.style.display = 'flex';
            fbRight.style.display = 'flex';

            setTimeout(() => {
                fbLeft.style.display = 'none';
                fbRight.style.display = 'none';
            }, 500);
        }

        async function startWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log(err); }
            }
        }

        function startOyun() {
            selectedLevel = levelSelect.value;
            currentStage = 0; // Seviye 1 seçilirse her zaman Stage 0'dan başlayacak

            initAudioEngine();
            startWakeLock();
            
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen(); }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => { if (permissionState === 'granted') { initGame(); } })
                    .catch(console.error);
            } else { initGame(); }
        }

        function initGame() {
            overlay.style.display = 'none';
            vrDivider.style.display = 'block';
            isPlaying = true;

            window.addEventListener('deviceorientation', handleOrientation, true);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scenes.push(createSceneArchitecture());
            scenes.push(createSceneArchitecture());

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[0].position.set(-ipd, 0, 7.5); cameras[0].rotation.y = 0.015; 

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[1].position.set(ipd, 0, 7.5); cameras[1].rotation.y = -0.015; 

            bird = scenes[0].getObjectByName("bird");
            leftNest = scenes[0].getObjectByName("leftNest");
            rightNest = scenes[0].getObjectByName("rightNest");

            updateGameConfigurations();
            resetBirdPosition();

            animate();
        }

        function createSceneArchitecture() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a252f); 

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
            scene.add(ambientLight);

            const birdGroup = new THREE.Group();
            birdGroup.name = "bird";

            const bodyGeo = new THREE.SphereGeometry(0.4, 32, 32);
            const bodyMat = new THREE.MeshBasicMaterial({ color: COLOR_YELLOW }); 
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            birdGroup.add(body);

            const beakGeo = new THREE.ConeGeometry(0.1, 0.3, 16);
            const beakMat = new THREE.MeshBasicMaterial({ color: 0xff5722 }); 
            const beak = new THREE.Mesh(beakGeo, beakMat);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0, 0, 0.4);
            birdGroup.add(beak);
            
            scene.add(birdGroup);

            const nestGeo = new THREE.CylinderGeometry(1.2, 1.5, 0.6, 32); 

            const lNest = new THREE.Mesh(nestGeo, new THREE.MeshBasicMaterial({ color: COLOR_BRIGHT_ORANGE }));
            lNest.name = "leftNest"; lNest.position.set(-2.5, -3.5, 0);
            scene.add(lNest);

            const rNest = new THREE.Mesh(nestGeo, new THREE.MeshBasicMaterial({ color: COLOR_BRIGHT_ORANGE }));
            rNest.name = "rightNest"; rNest.position.set(2.5, -3.5, 0);
            scene.add(rNest);

            const lineGeo = new THREE.BoxGeometry(7, 0.04, 0.1);
            const lineMat = new THREE.MeshBasicMaterial({color: 0x34495e});
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(0, 3.3, -0.5);
            scene.add(line);

            return scene;
        }

        function handleOrientation(event) {
            if (!isPlaying) return;
            let rawBeta = event.beta; 
            if (rawBeta === null) return;

            if (gyroCenterBeta === null) gyroCenterBeta = rawBeta;
            let deltaBeta = rawBeta - gyroCenterBeta;

            if (isWaitingForCenter) {
                if (Math.abs(deltaBeta) <= centerTolerance) {
                    isWaitingForCenter = false; 
                    playSound('center'); 
                }
                targetX = 0; 
            } else {
                if (Math.abs(deltaBeta) < deadzone) {
                    targetX = 0;
                } else {
                    targetX = deltaBeta * sensitivity;
                }
            }
        }

        function resetBirdPosition() {
            bird.position.set(0, 4, 0); 
            targetX = 0; currentX = 0;
            isWaitingForCenter = true; 
        }

        // --- SEVİYE VE AŞAMA RENK AYARLAMALARI ---
        function updateGameConfigurations() {
            let leftColor = COLOR_BRIGHT_ORANGE;
            let rightColor = COLOR_BRIGHT_ORANGE;
            let birdHex = COLOR_YELLOW;

            if (selectedLevel === "L0") {
                // SEVİYE 0: Antrenman Modu (Her şey standart, iki sepet de aktif ve turuncu)
                currentBirdColorType = "yellow";
                leftColor = COLOR_BRIGHT_ORANGE;
                rightColor = COLOR_BRIGHT_ORANGE;
            } 
            else if (selectedLevel === "L1") {
                // SEVİYE 1: Kognitif Akış (Stage 0 -> Stage 1 -> Stage 2)
                
                if (currentStage === 0) {
                    // STAGE 0: Kuş hep sarı düşer. Bir sepet parlak turuncu, diğeri sönük kalır.
                    currentBirdColorType = "yellow";
                    glowingNestSide = Math.random() > 0.5 ? "left" : "right";
                    
                    leftColor = (glowingNestSide === "left") ? COLOR_BRIGHT_ORANGE : COLOR_DIM_ORANGE;
                    rightColor = (glowingNestSide === "right") ? COLOR_BRIGHT_ORANGE : COLOR_DIM_ORANGE;
                } 
                else if (currentStage === 1) {
                    // STAGE 1: Standart Eşleştirme. Sol Mavi, Sağ Kırmızı. Kuş random mavi/kırmızı.
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    leftColor = COLOR_BLUE;
                    rightColor = COLOR_RED;
                } 
                else if (currentStage === 2) {
                    // STAGE 2 (Simon Efekti): Renk yerleri tersine döner! Sol KIRMIZI, Sağ MAVİ.
                    currentBirdColorType = Math.random() > 0.5 ? "blue" : "red";
                    leftColor = COLOR_RED;
                    rightColor = COLOR_BLUE;
                }
            }

            // Kuş rengini güncelle
            if (currentBirdColorType === "blue") birdHex = COLOR_BLUE;
            if (currentBirdColorType === "red") birdHex = COLOR_RED;

            bird.children[0].material.color.setHex(birdHex);
            scenes[1].getObjectByName("bird").children[0].material.color.setHex(birdHex);

            // Sepet renklerini güncelle
            leftNest.material.color.setHex(leftColor);
            rightNest.material.color.setHex(rightColor);
            scenes[1].getObjectByName("leftNest").material.color.setHex(leftColor);
            scenes[1].getObjectByName("rightNest").material.color.setHex(rightColor);
        }

        function checkCollisionAndProgress() {
            let hitCorrectNest = false;
            const finalX = bird.position.x;

            if (selectedLevel === "L0") {
                // Seviye 0'da herhangi bir sepete girmek yeterlidir (Skor artar)
                if (finalX < -0.8 || finalX > 0.8) hitCorrectNest = true;
            } 
            else if (selectedLevel === "L1") {
                // Seviye 1 kognitif aşama kontrolleri
                if (currentStage === 0) {
                    // Stage 0: Parlayan turuncu sepet kontrolü
                    if (finalX < -0.8 && glowingNestSide === "left") hitCorrectNest = true;
                    if (finalX > 0.8 && glowingNestSide === "right") hitCorrectNest = true;
                } 
                else if (currentStage === 1) {
                    // Stage 1: Sol Mavi, Sağ Kırmızı
                    if (finalX < -0.8 && currentBirdColorType === "blue") hitCorrectNest = true;
                    if (finalX > 0.8 && currentBirdColorType === "red") hitCorrectNest = true;
                } 
                else if (currentStage === 2) {
                    // Stage 2 (Simon Efekti): Mavi sepet sağda, Kırmızı sepet solda!
                    if (finalX < -0.8 && currentBirdColorType === "red") hitCorrectNest = true;  // Kırmızı için Sol
                    if (finalX > 0.8 && currentBirdColorType === "blue") hitCorrectNest = true; // Mavi için Sağ
                }
            }

            triggerFeedback(hitCorrectNest);

            if (hitCorrectNest) {
                totalScore++;
                
                // Sadece Seviye 1'de aşama (Stage) ilerlemesi vardır
                if (selectedLevel === "L1") {
                    stageSuccessCount++;
                    if (stageSuccessCount >= stageTargetCounts[currentStage]) {
                        stageSuccessCount = 0; 
                        currentStage++; // Bir sonraki aşamaya geç (Stage 0 -> Stage 1 -> Stage 2)
                        
                        if (currentStage > 2) {
                            isPlaying = false;
                            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
                            alert(`TEBRİKLER!\nSeviye 1'deki tüm kognitif aşamaları (Simon Efekti dahil) tamamladınız.\nToplam Skor: ${totalScore}`);
                            location.reload(); return;
                        }
                    }
                }
            }
            
            updateGameConfigurations(); resetBirdPosition();
        }

        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);

            // Merkez kilit görsel uyarısı
            if (isWaitingForCenter) {
                bird.children[0].material.color.setHex(0x555555); 
            } else {
                let birdHex = COLOR_YELLOW;
                if (currentBirdColorType === "blue") birdHex = COLOR_BLUE;
                if (currentBirdColorType === "red") birdHex = COLOR_RED;
                bird.children[0].material.color.setHex(birdHex); 
            }

            currentX += (targetX - currentX) * filterFactor;
            
            if(currentX > 3.5) currentX = 3.5;
            if(currentX < -3.5) currentX = -3.5;

            bird.position.x = currentX;

            if (!isWaitingForCenter) { bird.position.y -= dropSpeed; } 
            else { if(bird.position.y > 3.4) bird.position.y -= 0.05; }

            scenes[1].getObjectByName("bird").position.copy(bird.position);
            scenes[1].getObjectByName("bird").children[0].material.color.copy(bird.children[0].material.color);

            if (bird.position.y <= -3.2) checkCollisionAndProgress();

            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[0], cameras[0]);

            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[1], cameras[1]);
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            cameras[0].aspect = (window.innerWidth / 2) / window.innerHeight; cameras[0].updateProjectionMatrix();
            cameras[1].aspect = (window.innerWidth / 2) / window.innerHeight; cameras[1].updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
