<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>FTR VR - Seviye 1 (Anasayfa Çözüm A: Zorunlu Merkezleme)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(20, 30, 40, 0.95);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        #vr-divider {
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            background-color: rgba(255,255,255,0.2);
            z-index: 5;
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h2>Yavru Kuş Kurtarma: Seviye 1</h2>
        <p><b>ÇÖZÜM A: ZORUNLU MERKEZLEME AKTİF</b></p>
        <p>Telefonu tam karşınızda dik tutarak YAN ÇEVİRİN (Landscape) ve butona basın.</p>
        <p style="font-size: 14px; color: #e74c3c; font-weight: bold;">(Her tur başında kafanızı tam dik pozisyona getirene kadar yeni kuş düşmeye başlamaz!)</p>
        <button id="startButton">BAŞLAT VE KALİBRE ET</button>
    </div>

    <div id="vr-divider"></div>

    <script>
        // --- KLİNİK VE SAYASAL PARAMETRELER ---
        let currentStage = 0; 
        let stageTargetCounts = [5, 5, 5, 6]; 
        let stageSuccessCount = 0;
        let loopCounter = 1; 
        let totalScore = 0;

        // Jiroskop Filtreleme Değişkenleri
        let targetX = 0;
        let currentX = 0;
        const filterFactor = 0.05; 
        let gyroCenter = 0; // İlk kalibrasyondaki mutlak fiziksel merkezimiz
        const sensitivity = 0.12; 
        const deadzone = 1.0; 

        const dropSpeed = 0.04; 

        // ÇÖZÜM A DEĞİŞKENLERİ: Kuş serbest mi yoksa merkezleme mi bekleniyor?
        let isWaitingForCenter = true; 
        const centerTolerance = 2.0; // Hastanın kafasını merkeze ne kadar yaklaştırması gerektiği (derece)

        // Three.js ve VR Değişkenleri
        let scenes = [], cameras = [], renderer;
        let bird, leftNest, rightNest;
        let isPlaying = false;

        // Ses Efekti (Merkeze gelince hastaya geri bildirim vermek için AudioContext)
        let audioCtx = null;

        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const vrDivider = document.getElementById('vr-divider');

        startButton.addEventListener('click', startOyun);

        function playCenterBeep() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 600; // Net bir bip sesi
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function startOyun() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            initGame();
                        } else {
                            alert('Jiroskop izni reddedildi.');
                        }
                    })
                    .catch(console.error);
            } else {
                initGame();
            }
        }

        function initGame() {
            overlay.style.display = 'none';
            vrDivider.style.display = 'block';
            isPlaying = true;

            window.addEventListener('deviceorientation', handleOrientation, true);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scenes.push(createSceneArchitecture());
            cameras.push(new THREE.PerspectiveCamera(60, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[0].position.set(0, 0, 16);

            scenes.push(createSceneArchitecture());
            cameras.push(new THREE.PerspectiveCamera(60, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[1].position.set(0, 0, 16);

            bird = scenes[0].getObjectByName("bird");
            leftNest = scenes[0].getObjectByName("leftNest");
            rightNest = scenes[0].getObjectByName("rightNest");

            updateNestVisibilities();
            resetBirdPosition();

            animate();
        }

        function createSceneArchitecture() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a2a3a); 

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(0, 10, 5);
            scene.add(dirLight);

            // 3D Kuş
            const birdGroup = new THREE.Group();
            birdGroup.name = "bird";

            const bodyGeo = new THREE.SphereGeometry(0.4, 32, 32);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xf1c40f }); 
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            birdGroup.add(body);

            const beakGeo = new THREE.ConeGeometry(0.1, 0.3, 4);
            const beakMat = new THREE.MeshLambertMaterial({ color: 0xe67e22 }); 
            const beak = new THREE.Mesh(beakGeo, beakMat);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0, 0, 0.4);
            birdGroup.add(beak);
            
            scene.add(birdGroup);

            // Yuvalar (1.5 Kat Büyütülmüş)
            const nestMat = new THREE.MeshLambertMaterial({ color: 0xd35400 });
            const nestGeo = new THREE.CylinderGeometry(1.2, 1.5, 0.6, 16);

            const lNest = new THREE.Mesh(nestGeo, nestMat);
            lNest.name = "leftNest";
            lNest.position.set(-2.5, -3.5, 0);
            scene.add(lNest);

            const rNest = new THREE.Mesh(nestGeo, nestMat);
            rNest.name = "rightNest";
            rNest.position.set(2.5, -3.5, 0);
            scene.add(rNest);

            // Hedef Duraklama Çizgisi (Kuş beklerken duracağı yer için görsel kılavuz)
            const lineGeo = new THREE.BoxGeometry(7, 0.05, 0.1);
            const lineMat = new THREE.MeshBasicMaterial({color: 0x34495e});
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.position.set(0, 3.3, -0.5);
            scene.add(line);

            return scene;
        }

        function handleOrientation(event) {
            if (!isPlaying) return;

            let rawBeta = event.beta; 
            if (rawBeta === null) return;

            // İlk açılışta mutlak fiziksel merkezi kalibre et
            if (gyroCenter === 0) {
                gyroCenter = rawBeta;
            }

            let relativeAngle = rawBeta - gyroCenter;

            // ÇÖZÜM A KONTROLÜ: Eğer merkezleme bekleniyorsa
            if (isWaitingForCenter) {
                // Hasta kafasını mutlak merkeze getirdi mi? (Örn: -2 ile +2 derece arasında mı?)
                if (Math.abs(relativeAngle) <= centerTolerance) {
                    isWaitingForCenter = false; // Kuşu serbest bırak
                    playCenterBeep(); // İşitsel geribildirim ver
                }
                // Merkez beklerken jiroskop kuşu sağa sola oynatmasın, kuş ortada (0) çakılı beklesin
                targetX = 0; 
            } else {
                // Kuş serbest bırakıldıysa normal jiroskop takibi yap
                if (Math.abs(relativeAngle) < deadzone) {
                    targetX = 0;
                } else {
                    targetX = relativeAngle * sensitivity;
                }
            }
        }

        function resetBirdPosition() {
            bird.position.set(0, 4, 0); 
            targetX = 0;
            currentX = 0;
            
            // Yeni kuş doğduğunda otomatik olarak kilitle ve hastanın dik pozisyona gelmesini bekle
            isWaitingForCenter = true; 
        }

        function updateNestVisibilities() {
            if (currentStage === 0) {
                leftNest.visible = true;
                rightNest.visible = true;
            } else if (currentStage === 1) {
                leftNest.visible = false;
                rightNest.visible = true;
            } else if (currentStage === 2) {
                leftNest.visible = true;
                rightNest.visible = false;
            } else if (currentStage === 3) {
                const rand = Math.random() > 0.5;
                leftNest.visible = rand;
                rightNest.visible = !rand;
            }

            scenes[1].getObjectByName("leftNest").visible = leftNest.visible;
            scenes[1].getObjectByName("rightNest").visible = rightNest.visible;
        }

        function checkCollisionAndProgress() {
            let hitCorrectNest = false;

            if (bird.position.x > 0.8 && rightNest.visible) {
                hitCorrectNest = true; 
            } else if (bird.position.x < -0.8 && leftNest.visible) {
                hitCorrectNest = true; 
            } else if (currentStage === 0 && (bird.position.x > 0.8 || bird.position.x < -0.8)) {
                hitCorrectNest = true; 
            }

            if (hitCorrectNest) {
                stageSuccessCount++;
                totalScore++;
                
                if (stageSuccessCount >= stageTargetCounts[currentStage]) {
                    stageSuccessCount = 0;
                    currentStage++;

                    if (currentStage > 3) {
                        if (loopCounter < 2) {
                            loopCounter++;
                            currentStage = 1; 
                        } else {
                            isPlaying = false;
                            alert(`TEBRİKLER!\nZorunlu Merkezleme Seviyesini Bitirdiniz.\nToplam Skor: ${totalScore}`);
                            location.reload();
                            return;
                        }
                    }
                }
            }

            updateNestVisibilities();
            resetBirdPosition();
        }

        function animate() {
            if (!isPlaying) return;

            requestAnimationFrame(animate);

            // Kuş rengini duruma göre değiştir (Merkezleme beklerken opak/grimsi, düşerken sarı)
            if (isWaitingForCenter) {
                bird.children[0].material.color.setHex(0x7f8c8d); // Kilitli: Gri
            } else {
                bird.children[0].material.color.setHex(0xf1c40f); // Aktif: Canlı Sarı
            }

            currentX += (targetX - currentX) * filterFactor;
            
            if(currentX > 3.5) currentX = 3.5;
            if(currentX < -3.5) currentX = -3.5;

            bird.position.x = currentX;

            // ÇÖZÜM A: Sadece merkezleme şartı tamamlandıysa kuşu aşağı düşür
            if (!isWaitingForCenter) {
                bird.position.y -= dropSpeed;
            } else {
                // Merkez beklerken kuş yavaşça başlangıç çizgisine süzülüp orada asılı kalır
                if(bird.position.y > 3.4) bird.position.y -= 0.05;
            }

            scenes[1].getObjectByName("bird").position.copy(bird.position);
            // Renk senkronu
            scenes[1].getObjectByName("bird").children[0].material.color.copy(bird.children[0].material.color);

            if (bird.position.y <= -3.2) {
                checkCollisionAndProgress();
            }

            // VR BOX Çift Ekran Render
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[0], cameras[0]);

            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[1], cameras[1]);
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            cameras[0].aspect = (window.innerWidth / 2) / window.innerHeight;
            cameras[0].updateProjectionMatrix();
            cameras[1].aspect = (window.innerWidth / 2) / window.innerHeight;
            cameras[1].updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
