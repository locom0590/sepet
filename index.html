<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>FTR VR - Seviye 1 (Ă‡Ă¶zĂĽm C: ZÄ±t RĂĽzgar Efekti)</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(10, 15, 25, 0.98);
            z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        button {
            padding: 18px 36px; font-size: 20px; background-color: #2ecc71; color: white; border: none;
            border-radius: 8px; cursor: pointer; margin-top: 25px; font-weight: bold;
        }
        #vr-divider { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background-color: rgba(255,255,255,0.15); z-index: 5; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="overlay">
        <h2>Yavru KuĹź Kurtarma: Seviye 1</h2>
        <p><b>Ă‡Ă–ZĂśM C: ZIT RĂśZGAR EFEKTÄ° AKTÄ°F</b></p>
        <p>Telefonu YAN Ă‡EVÄ°RÄ°N, dĂĽz tutun ve butona basÄ±n.</p>
        <p style="font-size: 14px; color: #3498db; font-weight: bold;">(KuĹź her doÄźduÄźunda, bir Ă¶nceki hedefinizin tam tersi yĂ¶nĂĽne doÄźru rĂĽzgarla savrulur!)</p>
        <button id="startButton">VR MODUNU BAĹžLAT</button>
    </div>

    <div id="vr-divider"></div>

    <script>
        // --- KLÄ°NÄ°K VE SAYASAL PARAMETRELER ---
        let currentStage = 0; 
        let stageTargetCounts = [5, 5, 5, 6]; 
        let stageSuccessCount = 0;
        let loopCounter = 1; 
        let totalScore = 0;

        // Jiroskop Filtreleme DeÄźiĹźkenleri
        let targetX = 0;
        let currentX = 0;
        const filterFactor = 0.05; 
        let gyroCenter = 0; 
        const sensitivity = 0.15; 
        const deadzone = 1.0; 

        const dropSpeed = 0.04; 

        // --- Ă‡Ă–ZĂśM C DEÄžÄ°ĹžKENLERÄ° (RĂśZGAR MEKANÄ°ZMASI) ---
        let lastSuccessfulSide = "none"; // "right", "left" veya "none"
        let currentWindForce = 0; // O anki rĂĽzgarÄ±n kuĹźa uyguladÄ±ÄźÄ± X ekseni kuvveti
        const windStrength = 0.025; // RĂĽzgarÄ±n gĂĽcĂĽ (KuĹźun sĂĽzĂĽlme hÄ±zÄ±na gĂ¶re dengelendi)

        // VR Kamera ve Odak AyarlarÄ± (Toe-in 3D Derinlik)
        const ipd = 0.15; 

        // Three.js DeÄźiĹźkenleri
        let scenes = [], cameras = [], renderer;
        let bird, leftNest, rightNest;
        let isPlaying = false;
        let wakeLock = null;

        const overlay = document.getElementById('overlay');
        const startButton = document.getElementById('startButton');
        const vrDivider = document.getElementById('vr-divider');

        startButton.addEventListener('click', startOyun);

        async function requestScreenHandling() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) { docEl.requestFullscreen(); }
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log(err); }
            }
        }

        function startOyun() {
            requestScreenHandling();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => { if (permissionState === 'granted') { initGame(); } })
                    .catch(console.error);
            } else { initGame(); }
        }

        function initGame() {
            overlay.style.display = 'none';
            vrDivider.style.display = 'block';
            isPlaying = true;

            window.addEventListener('deviceorientation', handleOrientation, true);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scenes.push(createSceneArchitecture());
            scenes.push(createSceneArchitecture());

            // 3D Derinlikli Kamera Kurulumu (Toe-in)
            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[0].position.set(-ipd, 0, 7.5); 
            cameras[0].rotation.y = 0.015; 

            cameras.push(new THREE.PerspectiveCamera(90, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000));
            cameras[1].position.set(ipd, 0, 7.5); 
            cameras[1].rotation.y = -0.015; 

            bird = scenes[0].getObjectByName("bird");
            leftNest = scenes[0].getObjectByName("leftNest");
            rightNest = scenes[0].getObjectByName("rightNest");

            updateNestVisibilities();
            resetBirdPosition();

            animate();
        }

        function createSceneArchitecture() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a252f); 

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.5); 
            scene.add(ambientLight);

            // 3D KuĹź
            const birdGroup = new THREE.Group();
            birdGroup.name = "bird";

            const bodyGeo = new THREE.SphereGeometry(0.4, 32, 32);
            const bodyMat = new THREE.MeshBasicMaterial({ color: 0xffd700 }); 
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            birdGroup.add(body);

            const beakGeo = new THREE.ConeGeometry(0.1, 0.3, 16);
            const beakMat = new THREE.MeshBasicMaterial({ color: 0xff5722 }); 
            const beak = new THREE.Mesh(beakGeo, beakMat);
            beak.rotation.x = Math.PI / 2;
            beak.position.set(0, 0, 0.4);
            birdGroup.add(beak);
            
            scene.add(birdGroup);

            // Yuvalar (1.5 Kat BĂĽyĂĽk ve PĂĽrĂĽzsĂĽz)
            const nestMat = new THREE.MeshBasicMaterial({ color: 0xe67e22 });
            const nestGeo = new THREE.CylinderGeometry(1.2, 1.5, 0.6, 32); 

            const lNest = new THREE.Mesh(nestGeo, nestMat);
            lNest.name = "leftNest";
            lNest.position.set(-2.5, -3.5, 0);
            scene.add(lNest);

            const rNest = new THREE.Mesh(nestGeo, nestMat);
            rNest.name = "rightNest";
            rNest.position.set(2.5, -3.5, 0);
            scene.add(rNest);

            return scene;
        }

        function handleOrientation(event) {
            if (!isPlaying) return;
            let rawBeta = event.beta; 
            if (rawBeta === null) return;

            if (gyroCenter === 0) gyroCenter = rawBeta;
            let relativeAngle = rawBeta - gyroCenter;

            if (Math.abs(relativeAngle) < deadzone) {
                targetX = 0;
            } else {
                targetX = relativeAngle * sensitivity;
            }
        }

        function resetBirdPosition() {
            bird.position.set(0, 4, 0); 
            targetX = 0; 
            currentX = 0;

            // --- Ă‡Ă–ZĂśM C RĂśZGAR HESAPLAMASI ---
            if (lastSuccessfulSide === "right") {
                // En son saÄźa yerleĹźtiyse, rĂĽzgar SOLA doÄźru ĂĽfler (Eksi Kuvvet)
                currentWindForce = -windStrength;
                console.log("đźŚ¬ď¸Ź RĂĽzgar sola esiyor! SaÄźa gitmek iĂ§in kafayÄ± daha Ă§ok eÄźin.");
            } else if (lastSuccessfulSide === "left") {
                // En son sola yerleĹźtiyse, rĂĽzgar SAÄžA doÄźru ĂĽfler (ArtÄ± Kuvvet)
                currentWindForce = windStrength;
                console.log("đźŚ¬ď¸Ź RĂĽzgar saÄźa esiyor! Sola gitmek iĂ§in kafayÄ± daha Ă§ok eÄźin.");
            } else {
                // HenĂĽz ilk oyun veya Ä±sÄ±nma baĹźlangÄ±cÄ± ise rĂĽzgar rastgele yĂ¶n seĂ§er
                currentWindForce = Math.random() > 0.5 ? windStrength : -windStrength;
            }
        }

        function updateNestVisibilities() {
            if (currentStage === 0) { leftNest.visible = true; rightNest.visible = true; } 
            else if (currentStage === 1) { leftNest.visible = false; rightNest.visible = true; } 
            else if (currentStage === 2) { leftNest.visible = true; rightNest.visible = false; } 
            else if (currentStage === 3) {
                const rand = Math.random() > 0.5;
                leftNest.visible = rand; rightNest.visible = !rand;
            }
            scenes[1].getObjectByName("leftNest").visible = leftNest.visible;
            scenes[1].getObjectByName("rightNest").visible = rightNest.visible;
        }

        function checkCollisionAndProgress() {
            let hitCorrectNest = false;
            
            if (bird.position.x > 0.8 && rightNest.visible) {
                hitCorrectNest = true; 
                lastSuccessfulSide = "right"; // BaĹźarÄ± yĂ¶nĂĽnĂĽ kaydet
            } else if (bird.position.x < -0.8 && leftNest.visible) {
                hitCorrectNest = true; 
                lastSuccessfulSide = "left"; // BaĹźarÄ± yĂ¶nĂĽnĂĽ kaydet
            } else if (currentStage === 0 && (bird.position.x > 0.8 || bird.position.x < -0.8)) {
                hitCorrectNest = true; 
                lastSuccessfulSide = bird.position.x > 0.8 ? "right" : "left";
            }

            if (hitCorrectNest) {
                stageSuccessCount++; totalScore++;
                if (stageSuccessCount >= stageTargetCounts[currentStage]) {
                    stageSuccessCount = 0; currentStage++;
                    if (currentStage > 3) {
                        if (loopCounter < 2) { loopCounter++; currentStage = 1; } 
                        else {
                            isPlaying = false;
                            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
                            alert(`TEBRÄ°KLER! Seviye 1 RĂĽzgar Modu TamamlandÄ±!\nToplam Skor: ${totalScore}`);
                            location.reload(); return;
                        }
                    }
                }
            }
            updateNestVisibilities(); resetBirdPosition();
        }

        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);

            // Jiroskop pĂĽrĂĽzsĂĽzleĹźtirme kontrolĂĽ
            currentX += (targetX - currentX) * filterFactor;
            
            // --- Ă‡Ă–ZĂśM C RĂśZGAR ETKÄ°SÄ° UYGULAMA ---
            // KuĹź jiroskoptan baÄźÄ±msÄ±z olarak rĂĽzgar kuvveti yĂ¶nĂĽnde sĂĽrekli sĂĽrĂĽklenir
            currentX += currentWindForce;

            if(currentX > 3.5) currentX = 3.5;
            if(currentX < -3.5) currentX = -3.5;

            bird.position.x = currentX;
            bird.position.y -= dropSpeed; // Sabit sĂĽzĂĽlme dĂĽĹźĂĽĹźĂĽ

            scenes[1].getObjectByName("bird").position.copy(bird.position);

            if (bird.position.y <= -3.2) checkCollisionAndProgress();

            // VR Render Ă‡ift Ekran
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[0], cameras[0]);

            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissorTest(true);
            renderer.render(scenes[1], cameras[1]);
        }

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            cameras[0].aspect = (window.innerWidth / 2) / window.innerHeight; cameras[0].updateProjectionMatrix();
            cameras[1].aspect = (window.innerWidth / 2) / window.innerHeight; cameras[1].updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
